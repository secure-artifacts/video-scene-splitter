name: Build Windows and macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.0.0"
        required: false
        default: ""

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  APP_NAME: VideoSceneSplitter
  ENTRY_SCRIPT: video_scene_splitter.py

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            platform: windows
            executable_name: VideoSceneSplitter.exe
            pyinstaller_name: VideoSceneSplitter

          - name: macOS
            os: macos-latest
            platform: macos
            executable_name: VideoSceneSplitter
            pyinstaller_name: VideoSceneSplitter

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set release version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "RELEASE_VERSION=${{ github.ref_name }}" >> "$GITHUB_ENV"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=manual-build-${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Check project files
        shell: bash
        run: |
          echo "Current directory:"
          pwd
          echo "Files:"
          ls -la

          if [ ! -f "${{ env.ENTRY_SCRIPT }}" ]; then
            echo "ERROR: Cannot find ${{ env.ENTRY_SCRIPT }}"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 "scenedetect[opencv]" opencv-python pyinstaller

      - name: Build executable with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile --windowed --name "${{ matrix.pyinstaller_name }}" --collect-submodules scenedetect "${{ env.ENTRY_SCRIPT }}"
          ls -la dist

      - name: Check executable file
        shell: bash
        run: |
          if [ ! -f "dist/${{ matrix.executable_name }}" ]; then
            echo "ERROR: Build failed, dist/${{ matrix.executable_name }} not found"
            exit 1
          fi

      - name: Create ZIP package
        shell: bash
        run: |
          cd dist
          python -c "import zipfile; z=zipfile.ZipFile('${{ env.APP_NAME }}-${{ env.RELEASE_VERSION }}-${{ matrix.platform }}.zip','w',zipfile.ZIP_DEFLATED); z.write('${{ matrix.executable_name }}'); z.close()"

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            certutil -hashfile "${{ matrix.executable_name }}" SHA256 > "${{ matrix.executable_name }}.sha256.txt"
            certutil -hashfile "${{ env.APP_NAME }}-${{ env.RELEASE_VERSION }}-${{ matrix.platform }}.zip" SHA256 > "${{ env.APP_NAME }}-${{ env.RELEASE_VERSION }}-${{ matrix.platform }}.zip.sha256.txt"
          else
            shasum -a 256 "${{ matrix.executable_name }}" > "${{ matrix.executable_name }}.sha256.txt"
            shasum -a 256 "${{ env.APP_NAME }}-${{ env.RELEASE_VERSION }}-${{ matrix.platform }}.zip" > "${{ env.APP_NAME }}-${{ env.RELEASE_VERSION }}-${{ matrix.platform }}.zip.sha256.txt"
          fi

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/${{ matrix.executable_name }}
            dist/${{ matrix.executable_name }}.sha256.txt
            dist/${{ env.APP_NAME }}-${{ env.RELEASE_VERSION }}-${{ matrix.platform }}.zip
            dist/${{ env.APP_NAME }}-${{ env.RELEASE_VERSION }}-${{ matrix.platform }}.zip.sha256.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.platform }}
          path: |
            dist/${{ matrix.executable_name }}
            dist/${{ matrix.executable_name }}.sha256.txt
            dist/${{ env.APP_NAME }}-${{ env.RELEASE_VERSION }}-${{ matrix.platform }}.zip
            dist/${{ env.APP_NAME }}-${{ env.RELEASE_VERSION }}-${{ matrix.platform }}.zip.sha256.txt
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Set release version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "RELEASE_VERSION=${{ github.ref_name }}" >> "$GITHUB_ENV"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=manual-build-${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show release assets
        shell: bash
        run: |
          find release-assets -maxdepth 3 -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: Video Scene Splitter ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          files: |
            release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
