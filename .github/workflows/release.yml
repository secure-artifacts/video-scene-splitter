name: Build Windows EXE and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.0.0"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Set release version
        shell: bash
        run: |
          echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name VideoSceneSplitter video_scene_splitter.py

      - name: Create ZIP package
        run: |
          powershell Compress-Archive -Path dist\VideoSceneSplitter.exe -DestinationPath dist\VideoSceneSplitter-${{ env.RELEASE_VERSION }}-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: Video Scene Splitter ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          files: |
            dist/VideoSceneSplitter.exe
            dist/VideoSceneSplitter-${{ env.RELEASE_VERSION }}-windows.zip
