name: Build Windows EXE and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.0.0"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Set release version
        shell: bash
        run: |
          echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 scenedetect[opencv] opencv-python pyinstaller

      - name: Check project files
        shell: powershell
        run: |
          dir
          if (!(Test-Path "video_scene_splitter.py.py")) {
            Write-Error "Cannot find video_scene_splitter.py.py"
            exit 1
          }

      - name: Build EXE with PyInstaller
        shell: powershell
        run: |
          pyinstaller --onefile --windowed --name VideoSceneSplitter "video_scene_splitter.py.py"

      - name: Check EXE file
        shell: powershell
        run: |
          if (!(Test-Path "dist\VideoSceneSplitter.exe")) {
            Write-Error "EXE build failed: dist\VideoSceneSplitter.exe not found"
            exit 1
          }

      - name: Create ZIP package
        shell: powershell
        run: |
          Compress-Archive -Path "dist\VideoSceneSplitter.exe" -DestinationPath "dist\VideoSceneSplitter-${{ env.RELEASE_VERSION }}-windows.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: Video Scene Splitter ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          files: |
            dist/VideoSceneSplitter.exe
            dist/VideoSceneSplitter-${{ env.RELEASE_VERSION }}-windows.zip
